[features]
hooks = true

[[hooks.PreToolUse]]
# Replace warehouse and execute_sql with your MCP server/tool names.
matcher = "^mcp__warehouse__execute_sql$"

[[hooks.PreToolUse.hooks]]
type = "command"
command = 'MCP_SQL_RESULT_GUARD_RULES="$(git rev-parse --show-toplevel)/.codex/hooks/sensitive_columns.tsv" MCP_SQL_RESULT_GUARD_DIALECT=redshift mcp-sql-result-guard'
timeout = 10
statusMessage = "Checking the final SQL result for sensitive values"

# For Windows, set the environment variables in a wrapper .ps1 file or use a
# project-local virtual environment with an absolute executable path.
