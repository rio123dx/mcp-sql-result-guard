name: bootstrap-source

on:
  push:
    branches: [main]

permissions:
  contents: write

jobs:
  bootstrap:
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Expand source archive
        shell: bash
        run: |
          cat .bootstrap/chunk_* > source.tar.gz.b64
          base64 --decode source.tar.gz.b64 > source.tar.gz
          tar -xzf source.tar.gz
          rm -rf .bootstrap .github/workflows/bootstrap.yml source.tar.gz.b64 source.tar.gz
      - name: Run regression tests
        run: |
          python -m pip install --upgrade pip
          python -m pip install -e ".[dev]"
          python -m pytest
          python scripts/run_scenarios.py
          rm -f scenario-results.tsv scenario-summary.txt
      - name: Commit expanded public source
        shell: bash
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A
          git commit -m "Initial release of mcp-sql-result-guard"
          git push origin HEAD:main
